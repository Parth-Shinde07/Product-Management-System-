<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans p-8">

<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">📦 Product Management Dashboard</h1>

    <div class="bg-white p-6 rounded-lg shadow-md mb-8">
        <h2 id="form-title" class="text-xl font-semibold mb-4 text-gray-700">Add New Product</h2>
        <form id="product-form" class="space-y-4">
            <input type="hidden" id="product-id">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600">Product Name</label>
                    <input type="text" id="product-name" required class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Price ($)</label>
                    <input type="number" id="product-price" step="0.01" required class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
            </div>
            <div class="flex gap-2">
                <button type="submit" id="submit-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md font-medium transition">Save Product</button>
                <button type="button" id="cancel-btn" onclick="resetForm()" class="hidden bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded-md font-medium transition">Cancel</button>
            </div>
        </form>
    </div>

    <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="bg-gray-800 text-white">
                <th class="p-4">ID</th>
                <th class="p-4">Name</th>
                <th class="p-4">Price</th>
                <th class="p-4 text-center">Actions</th>
            </tr>
            </thead>
            <tbody id="product-table-body" class="divide-y divide-gray-200">
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8080/api/products';


    document.addEventListener('DOMContentLoaded', function() {
        fetchProducts();
    });


    document.getElementById('product-form').addEventListener('submit', function(e) {
        e.preventDefault();

        const id = document.getElementById('product-id').value;
        const name = document.getElementById('product-name').value;
        const price = parseFloat(document.getElementById('product-price').value);

        const productData = { name: name, price: price };

        if (id) {

            fetch(API_URL + '/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(productData)
            }).then(function() {
                fetchProducts();
                resetForm();
            });
        } else {

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(productData)
            }).then(function() {
                fetchProducts();
                resetForm();
            });
        }
    });


    function fetchProducts() {
        fetch(API_URL)
            .then(function(res) { return res.json(); })
            .then(function(products) {
                const tbody = document.getElementById('product-table-body');
                tbody.innerHTML = '';

                if (products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-gray-500">No products found. Add one above!</td></tr>';
                    return;
                }

                products.forEach(function(product) {

                    var row = '<tr class="hover:bg-gray-50">' +
                        '<td class="p-4 font-semibold text-gray-700">' + product.id + '</td>' +
                        '<td class="p-4 text-gray-600">' + product.name + '</td>' +
                        '<td class="p-4 text-gray-600">$' + product.price.toFixed(2) + '</td>' +
                        '<td class="p-4 text-center space-x-2">' +
                            '<button onclick="editProduct(' + product.id + ', \'' + product.name + '\', ' + product.price + ')" class="bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1 rounded text-sm transition">Edit</button>' +
                            '<button onclick="deleteProduct(' + product.id + ')" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm transition">Delete</button>' +
                        '</td>' +
                    '</tr>';
                    tbody.innerHTML += row;
                });
            });
    }


    function editProduct(id, name, price) {
        document.getElementById('product-id').value = id;
        document.getElementById('product-name').value = name;
        document.getElementById('product-price').value = price;

        document.getElementById('form-title').innerText = "Edit Product #" + id;
        document.getElementById('submit-btn').innerText = "Update Product";
        document.getElementById('cancel-btn').classList.remove('hidden');
    }


    function deleteProduct(id) {
        if (confirm('Are you sure you want to delete this product?')) {
            fetch(API_URL + '/' + id, { method: 'DELETE' })
                .then(function() { fetchProducts(); });
        }
    }


    function resetForm() {
        document.getElementById('product-id').value = '';
        document.getElementById('product-form').reset();
        document.getElementById('form-title').innerText = "Add New Product";
        document.getElementById('submit-btn').innerText = "Save Product";
        document.getElementById('cancel-btn').classList.add('hidden');
    }
</script>
</body>
</html>

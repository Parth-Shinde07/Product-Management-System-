<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Product Management</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

<!-- Navigation Bar -->
<nav class="bg-slate-900 text-white shadow-md">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <span class="font-bold text-lg tracking-wider text-indigo-400">Enterprise Suite</span>
        <div class="space-x-6">
            <a href="index.html" class="hover:text-indigo-300 transition-colors font-medium border-b-2 border-indigo-500 pb-1">📦 Product Manager</a>
            <a href="orders.html" class="hover:text-indigo-300 transition-colors font-medium">📈 Order Tracker</a>
        </div>
    </div>
</nav>

<div class="max-w-6xl mx-auto p-6">
    <h1 class="text-3xl font-extrabold text-slate-900 mb-6 tracking-tight">📦 Inventory & Product Control</h1>

    <!-- Stats Overview Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-xs flex flex-col">
            <span class="text-sm font-medium text-slate-400 uppercase">Total Items</span>
            <span id="stat-total-items" class="text-3xl font-bold text-blue-600">0</span>
        </div>
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-xs flex flex-col">
            <span class="text-sm font-medium text-slate-400 uppercase">Total Valuation</span>
            <span id="stat-total-value" class="text-3xl font-bold text-green-600">$0.00</span>
        </div>
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-xs flex flex-col">
            <span class="text-sm font-medium text-slate-400 uppercase">Average Price</span>
            <span id="stat-avg-price" class="text-3xl font-bold text-purple-600">$0.00</span>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Add/Edit Product Card -->
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-xs h-fit">
            <h2 id="form-title" class="text-lg font-bold mb-4 text-slate-800">Add New Product</h2>
            <form id="product-form" class="space-y-4">
                <input type="hidden" id="product-id">
                <div>
                    <label class="block text-sm font-semibold text-slate-600">Product Name</label>
                    <input type="text" id="product-name" required minlength="2" maxlength="50" placeholder="e.g., Wireless Mouse" class="w-full mt-1 p-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600">Price ($)</label>
                    <input type="number" id="product-price" step="0.01" min="0" required placeholder="0.00" class="w-full mt-1 p-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <!-- 🔴 NEW STOCK INPUT FIELD -->
                <div>
                    <label class="block text-sm font-semibold text-slate-600">Stock Quantity</label>
                    <input type="number" id="product-stock" min="0" required placeholder="10" class="w-full mt-1 p-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition shadow-sm">Save Item</button>
                    <button type="button" id="cancel-btn" onclick="resetForm()" class="hidden bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium px-4 py-2 rounded-lg transition">Cancel</button>
                </div>
            </form>
        </div>

        <!-- Product Table Card -->
        <div class="lg:col-span-2 space-y-4">
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs flex items-center">
                <input type="text" id="search-input" oninput="filterProducts()" placeholder="🔍 Search products by name..." class="w-full p-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <div class="bg-white rounded-xl border border-slate-200 shadow-xs overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                    <tr class="bg-slate-100 border-b border-slate-200 text-slate-600 text-xs font-semibold uppercase tracking-wider">
                        <th class="p-4 w-16">ID</th>
                        <th class="p-4">Name</th>
                        <th class="p-4 w-28">Price</th>
                        <th class="p-4 w-28">Stock</th> <!-- 🔴 NEW TABLE HEADER -->
                        <th class="p-4 text-center w-40">Actions</th>
                    </tr>
                    </thead>
                    <tbody id="product-table-body" class="divide-y divide-slate-100 text-slate-700">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8080/api/products';
    let allProducts = [];

    // Global Authorization Helper
    function getAuthHeaders() {
        const token = localStorage.getItem("admin_jwt_token");
        return token ? { "Authorization": `Bearer ${token}` } : {};
    }

    document.addEventListener('DOMContentLoaded', function() {
        fetchProducts();
    });

    // 1. Save / Update Product Form Submission
    document.getElementById('product-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const id = document.getElementById('product-id').value;
        const name = document.getElementById('product-name').value;
        const price = parseFloat(document.getElementById('product-price').value);
        const stock = parseInt(document.getElementById('product-stock').value);

        const productData = {
            name: name,
            price: price,
            stockQuantity: stock
        };

        const requestConfig = id ? {
            url: API_URL + '/' + id,
            method: 'PUT'
        } : {
            url: API_URL,
            method: 'POST'
        };

        try {
            const res = await fetch(requestConfig.url, {
                method: requestConfig.method,
                headers: {
                    'Content-Type': 'application/json',
                    ...getAuthHeaders() // 🔴 ADDED AUTH HEADER HERE
                },
                body: JSON.stringify(productData)
            });

            if (res.status === 401 || res.status === 403) {
                alert("Session expired or unauthorized. Please log in again.");
                window.location.href = "orders.html";
                return;
            }

            if (!res.ok) throw new Error("Validation Failed");

            await res.json();
            fetchProducts();
            resetForm();
        } catch (err) {
            console.error(err);
            alert("Error saving data. Verify constraints are met.");
        }
    });

    // 2. Read All Products
    async function fetchProducts() {
        try {
            const response = await fetch(API_URL, {
                headers: {
                    ...getAuthHeaders(), // 🔴 ADDED AUTH HEADER HERE
                    "Accept": "application/json"
                }
            });

            if (response.status === 401 || response.status === 403) {
                alert("Session expired or unauthorized. Redirecting to login...");
                window.location.href = "orders.html";
                return;
            }

            if (!response.ok) throw new Error("Failed to load backend product list.");

            const products = await response.json();
            allProducts = products; // Sync local state

            renderTable(products);
            calculateMetrics(products);
        } catch (error) {
            console.error("Error:", error);
        }
    }

    // 3. Render Table Component
    function renderTable(productsList) {
        const tbody = document.getElementById('product-table-body');
        tbody.innerHTML = '';

        if (!productsList || productsList.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-400 italic">No products match your criteria.</td></tr>';
            return;
        }

        productsList.forEach(function(product) {
            const stockValue = product.stockQuantity !== undefined ? product.stockQuantity : 0;
            const stockClass = stockValue <= 5 ? "text-red-600 font-bold" : "text-slate-500";

            const row = '<tr class="hover:bg-slate-50/70 transition-colors">' +
                '<td class="p-4 font-mono text-xs text-slate-400">' + product.id + '</td>' +
                '<td class="p-4 font-medium text-slate-800">' + product.name + '</td>' +
                '<td class="p-4 font-semibold text-slate-900">$' + product.price.toFixed(2) + '</td>' +
                '<td class="p-4 ' + stockClass + '">' + stockValue + '</td>' +
                '<td class="p-4 text-center space-x-1">' +
                    '<button onclick="editProduct(' + product.id + ', \'' + product.name.replace(/'/g, "\\'") + '\', ' + product.price + ', ' + stockValue + ')" class="text-amber-600 hover:bg-amber-50 px-2.5 py-1 rounded-md text-sm font-medium transition cursor-pointer">Edit</button>' +
                    '<button onclick="deleteProduct(' + product.id + ')" class="text-red-600 hover:bg-red-50 px-2.5 py-1 rounded-md text-sm font-medium transition cursor-pointer">Delete</button>' +
                '</td>' +
            '</tr>';
            tbody.insertAdjacentHTML('beforeend', row);
        });
    }

    // 4. Search Filtering Logic
    function filterProducts() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query));
        renderTable(filtered);
    }

    // 5. Analytics Calculator
    function calculateMetrics(products) {
        const count = products.length;
        const totalValuation = products.reduce((sum, p) => sum + p.price, 0);
        const avg = count > 0 ? (totalValuation / count) : 0;

        document.getElementById('stat-total-items').innerText = count;
        document.getElementById('stat-total-value').innerText = '$' + totalValuation.toFixed(2);
        document.getElementById('stat-avg-price').innerText = '$' + avg.toFixed(2);
    }

    // 6. Pre-Populate Fields for Editing
    function editProduct(id, name, price, stock) {
        document.getElementById('product-id').value = id;
        document.getElementById('product-name').value = name;
        document.getElementById('product-price').value = price;
        document.getElementById('product-stock').value = stock;

        document.getElementById('form-title').innerText = "Modify Product #" + id;
        document.getElementById('submit-btn').innerText = "Apply Updates";
        document.getElementById('cancel-btn').classList.remove('hidden');
    }

    // 7. Delete Product
    async function deleteProduct(id) {
        if (confirm('Permanently remove this product from inventory?')) {
            try {
                const response = await fetch(API_URL + '/' + id, {
                    method: 'DELETE',
                    headers: { ...getAuthHeaders() } // 🔴 ADDED AUTH HEADER HERE
                });

                if (response.status === 401 || response.status === 403) {
                    alert("Session expired or unauthorized.");
                    window.location.href = "orders.html";
                    return;
                }

                if (!response.ok) throw new Error("Failed to delete product.");

                fetchProducts();
            } catch (err) {
                console.error(err);
                alert("Could not remove product from database.");
            }
        }
    }

    // 8. Reset state
    function resetForm() {
        document.getElementById('product-id').value = '';
        document.getElementById('product-form').reset();
        document.getElementById('form-title').innerText = "Add New Product";
        document.getElementById('submit-btn').innerText = "Save Item";
        document.getElementById('cancel-btn').classList.add('hidden');
    }
</script>
</body>
</html>
